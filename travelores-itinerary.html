    body {

      background-position: center;
      background-attachment: fixed;
      color: #333; 
      text-align: center; 
      min-height: 100vh;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }
    nav { 
      background: #0f0f0ffd; 
      padding: 10px 30px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      position: sticky; 
      top: 0; 
      z-index: 1000; 
    }
    .nav-left { display: flex; align-items: center; }
    .nav-brand { display: flex; align-items: center; text-decoration: none; color: inherit; }
    .nav-left img { width: 70px; height: 70px; margin-right: 10px; border-radius: 50%; }
    .nav-left h1 { color: white; margin: 0; font-size: 22px; }
    .nav-right { display: flex; align-items: center; }
    .nav-right ul { display: flex; list-style: none; margin: 0; padding: 0; }
    .nav-right li { margin-left: 20px; }
    .nav-right a { color: white; text-decoration: none; font-weight: bold; transition: color 0.3s; }
    .nav-right a:hover { color: #a50505; }

    .header-section {
      background: linear-gradient(135deg, #a50505 0%, #330404 100%);
      padding: 50px 20px;
      color: white;
      margin-bottom: 40px;
    }
    .header-section h2 { font-size: 48px; margin: 0 0 15px; }
    .header-section p { font-size: 20px; margin: 0; opacity: 0.95; }

    .container { 
      max-width: 1400px; 
      margin: 0 auto; 
      padding: 0 20px 60px; 
    }

    .countries-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }

    .country-card {
      background: rgb(21, 20, 20);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      transition: transform 0.3s ease, box-shadow 0.3s;
      cursor: pointer;
    }
    .country-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 30px rgba(165, 5, 5, 0.4);
    }
    .country-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .country-card-content {
      padding: 25px;
      text-align: left;
    }
    .country-card h3 {
      color: #f0e9d5;
      margin: 0 0 10px;
      font-size: 26px;
    }
    .country-card p {
      color: #ddd;
      margin: 0 0 15px;
      font-size: 15px;
    }
    .country-card .days-info {
      color: #a50505;
      font-weight: bold;
      font-size: 14px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.85);
      overflow-y: auto;
      padding: 20px;
    }
    .modal-content {
      background: rgb(21, 20, 20);
      margin: 40px auto;
      padding: 0;
      max-width: 900px;
      border-radius: 12px;
      position: relative;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      position: relative;
      height: 300px;
      overflow: hidden;
    }
    .modal-header img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .modal-header-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      padding: 30px;
      color: white;
    }
    .modal-header h2 {
      margin: 0;
      font-size: 42px;
    }
    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: white;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
      z-index: 10;
      background: rgba(0,0,0,0.5);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .close:hover { background: #a50505; }
    
    .modal-body {
      padding: 40px;
      color: white;
    }
    .day-section {
      background: #2d2d2d;
      border-radius: 8px;
      padding: 25px;
      margin-bottom: 25px;
      border-left: 4px solid #a50505;
    }
    .day-section h3 {
      color: #f0e9d5;
      margin: 0 0 20px;
      font-size: 24px;
    }
    .activity {
      background: #1a1a1a;
      padding: 15px 20px;
      margin: 12px 0;
      border-radius: 6px;
      border-left: 3px solid #330404;
    }
    .activity-time {
      color: #a50505;
      font-weight: bold;
      font-size: 14px;
      display: block;
      margin-bottom: 5px;
    }
    .activity-title {
      color: #f0e9d5;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 5px;
    }
    .activity-desc {
      color: #bbb;
      font-size: 14px;
      line-height: 1.5;
    }

    footer { 
      background: #151515fd; 
      color: white; 
      text-align: center; 
      padding: 20px; 
      margin-top: 40px; 
    }

    @media (max-width: 768px) {
      .header-section h2 { font-size: 36px; }
      .modal-header h2 { font-size: 32px; }
      .modal-body { padding: 25px; }
    }
  </style>

    function renderCountries() {
      const grid = document.getElementById('countriesGrid');
      grid.innerHTML = ''; // Clear existing content
      countries.forEach((country, index) => {
        const card = document.createElement('div');
        card.className = 'country-card';
        card.onclick = () => openModal(index);
        
        // Fallback image for cards
        const fallbackImage = 'https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=800'; 
        
        card.innerHTML = `
          <img src="${country.image}" alt="${country.name}" onerror="this.src='${fallbackImage}'">
          <div class="country-card-content">
            <h3>${country.name}</h3>
            <p>${country.description}</p>
            <div class="days-info">${country.days.length} Days Itinerary</div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function openModal(index) {
      const country = countries[index];
      const modal = document.getElementById('itineraryModal');
      const modalImage = document.getElementById('modalImage');
      const modalTitle = document.getElementById('modalTitle');
      const modalBody = document.getElementById('modalBody');
      
      const fallbackImage = 'https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=800';

      modalImage.src = country.image;
      modalImage.onerror = () => { modalImage.src = fallbackImage; };
      modalTitle.textContent = country.name;

      let bodyHTML = '';
      country.days.forEach(day => {
        bodyHTML += `
          <div class="day-section">
            <h3>Day ${day.day}: ${day.title}</h3>
        `;
        day.activities.forEach(activity => {
          bodyHTML += `
            <div class="activity">
              <span class="activity-time">${activity.time}</span>
              <div class="activity-title">${activity.title}</div>
              <div class="activity-desc">${activity.desc}</div>
            </div>
          `;
        });
        bodyHTML += '</div>';
      });

      modalBody.innerHTML = bodyHTML;
      modal.style.display = 'block';
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('itineraryModal').style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    window.onclick = function(event) {
      const modal = document.getElementById('itineraryModal');
      if (event.target == modal) {
        closeModal();
      }
    }

    // Initialize the page by rendering the country cards
    renderCountries();
  </script>
