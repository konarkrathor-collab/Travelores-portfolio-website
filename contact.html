<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Travelores.com</title>
    <style>
        body {
            font-family: 'Poppins', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('contactus1.jpg'); /* Added background image */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative; /* Needed for the pseudo-element overlay */
            color: #333; /* Default text color, adjusted below for header/footer if needed */
            text-align: center;
        }

        /* Semi-transparent overlay for background image readability */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* 50% opaque black overlay */
            z-index: -1; /* Places overlay behind content, but on top of background image */
        }

        nav { background: #0f0f0ffd; padding: 10px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-left { display: flex; align-items: center; }
        .nav-brand { display: flex; align-items: center; text-decoration: none; color: inherit; }
        .nav-left img { width: 70px; height: 70px; margin-right: 10px; border-radius: 50%; }
        .nav-left h1 { color: white; margin: 0; font-size: 22px; }
        .nav-right ul { display: flex; list-style: none; margin: 0; padding: 0; }
        .nav-right li { margin-left: 20px; }
        .nav-right a { color: white; text-decoration: none; font-weight: bold; transition: color 0.3s; }
        .nav-right a:hover { color: #a50505; }
        .contact-form-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #fff; /* Form container background remains white */
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative; /* Ensures form content is above the body overlay */
            z-index: 1;
        }
        .contact-form-container h2 {
            font-size: 36px;
            color: #c0392b;
            margin-bottom: 20px;
        }
        .contact-form-container form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }
        .contact-form-container label {
            font-weight: bold;
            color: #555;
        }
        .contact-form-container input,
        .contact-form-container textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .contact-form-container textarea {
            resize: vertical;
        }
        .contact-form-container .submit-btn {
            background: #a50505;
            color: white;
            border: none;
            padding: 15px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 18px;
            transition: background 0.3s;
        }
        .contact-form-container .submit-btn:hover {
            background: #8e0404;
        }
        footer { background: #151515fd; color: white; text-align: center; padding: 20px; margin-top: 40px; position: relative; z-index: 1; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="WEBSITE.HTML#home" class="nav-brand">
                <img src="logo.jpg" alt="Travelores Logo">
                <h1>Travelores.com</h1>
            </a>
        </div>
        <div class="nav-right">
            <ul>
                <li><a href="WEBSITE.HTML#home">Home</a></li>
                <li><a href="destination.html">Destinations</a></li>
                <li><a href="WEBSITE.HTML#login">Login</a></li>
                <li><a href="travelores-itinerary.html">Itinerary</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section class="contact-form-container">
        <h2>Get in Touch</h2>
        <form action="ContactServlet" method="post">
            <div>
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div>
                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div>
                <label for="message">Your Message</label>
                <textarea id="message" name="message" rows="6" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </section>

    <footer id="contact">
        <p>&copy; 2026 Travelores.com | Made for travelers</p>
    </footer>

</body>
</html>
